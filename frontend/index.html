<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="dareeda — piattaforma di analisi EDA" />

    <title>dareeda</title>

    <!-- Satoshi font (Fontshare CDN) -->
    <link
      rel="preconnect"
      href="https://api.fontshare.com"
      crossorigin
    />
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,700&display=swap"
      rel="stylesheet"
    />

    <!--
      Applica il tema prima del primo paint per eliminare il FOUC.
      Legge `dareeda-theme` da localStorage; fallback su prefers-color-scheme.
    -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('dareeda-theme')
          if (saved === 'light' || saved === 'dark') {
            document.documentElement.setAttribute('data-theme', saved)
            return
          }
        } catch (_) {}
        var dark = window.matchMedia('(prefers-color-scheme: dark)').matches
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light')
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
